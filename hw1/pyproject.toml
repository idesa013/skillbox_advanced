[tool.black]
line-length = 88
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 88
lines_after_imports = 2

[tool.mypy]
files = ["src", "tests"]
cache_dir = "mypy_cache"
mypy_path = "src"
python_version = "3.11"
sqlite_cache = false
strict = true
warn_unreachable = true

[tool.pytest.ini_options]
addopts = ["-p", "no:cacheprovider"]
pythonpath = ["src"]
testpaths = ["tests"]
